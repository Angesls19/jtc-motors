<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTC MOTORS | ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* FIKSĒTS DIZAINS */
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; color: #1e293b; }
        .sidebar { width: 260px; background: #000; height: 100vh; position: fixed; padding: 30px 20px; color: #fff; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .main-content { margin-left: 260px; padding: 40px; }
        
        /* KARTĪTES UN LAUKI */
        .admin-card { background: #ffffff; border-radius: 16px; padding: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 6px; }
        .jtc-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-weight: 600; font-size: 15px; margin-bottom: 15px; transition: all 0.2s; }
        .jtc-input:focus { border-color: #000; outline: none; background: #fff; }
        
        /* POGAS */
        .btn-jtc { background: #000; color: #fff; padding: 14px; border-radius: 10px; font-weight: 800; text-transform: uppercase; width: 100%; cursor: pointer; transition: transform 0.1s; }
        .btn-jtc:active { transform: scale(0.98); }
        .btn-scan { background: #d4af37; color: #000; padding: 12px; border-radius: 10px; border: 2px solid #000; }

        /* TABULA */
        .jtc-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .jtc-table th { padding: 10px 20px; text-align: left; font-size: 11px; text-transform: uppercase; color: #94a3b8; }
        .jtc-table td { background: #fff; padding: 18px 20px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-weight: 700; }
        .jtc-table td:first-child { border-left: 1px solid #f1f5f9; border-radius: 12px 0 0 12px; }
        .jtc-table td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 12px 12px 0; }

        .shelf-badge { background: #eff6ff; color: #2563eb; padding: 4px 10px; border-radius: 6px; font-size: 13px; }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .sidebar h2, .sidebar span, .sidebar div { display: none; }
            .main-content { margin-left: 70px; padding: 20px; }
        }
    </style>
</head>
<body>

<div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-[9999]">
    <div class="bg-white p-10 rounded-3xl w-80 text-center shadow-2xl border-t-8 border-[#d4af37]">
        <h1 class="text-3xl font-black mb-8 italic">JTC <span class="text-[#d4af37]">ADMIN</span></h1>
        <input id="pass" type="password" placeholder="Parole" class="jtc-input text-center mb-6">
        <button onclick="login()" class="btn-jtc">Ieeit</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="sidebar">
        <h2 class="text-2xl font-black italic mb-12 text-[#d4af37]">JTC</h2>
        <nav class="space-y-4">
            <div class="p-4 bg-white text-black rounded-xl font-bold cursor-pointer"><i class="fas fa-boxes mr-3"></i> Noliktava</div>
            <div class="p-4 hover:bg-zinc-900 rounded-xl font-bold cursor-pointer opacity-60"><i class="fas fa-tools mr-3"></i> Serviss</div>
            <div class="p-4 hover:bg-zinc-900 rounded-xl font-bold cursor-pointer opacity-60"><i class="fas fa-users mr-3"></i> Klienti</div>
        </nav>
    </div>

    <div class="main-content">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black italic">Noliktavas <span class="text-gray-400">Pārvalde</span></h1>
            <button onclick="location.reload()" class="text-xs font-bold uppercase tracking-widest text-red-500 opacity-50 hover:opacity-100">Iziet</button>
        </header>

        <div class="admin-card grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="space-y-4">
                <div class="input-group">
                    <label>Preces nosaukums</label>
                    <input id="n" class="jtc-input" placeholder="Piemēram: Eļļas filtrs BMW">
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="input-group"><label>Cena (€)</label><input id="p" class="jtc-input" placeholder="0.00"></div>
                    <div class="input-group"><label>Skaits</label><input id="q" class="jtc-input" value="1"></div>
                    <div class="input-group"><label>Plaukts</label><input id="sh" class="jtc-input" placeholder="A1"></div>
                </div>
                <div class="input-group">
                    <label>EAN / Svītrkods</label>
                    <div class="flex gap-3">
                        <input id="ean" class="jtc-input bg-gray-50 mb-0" readonly>
                        <button class="btn-scan"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
                <button onclick="add()" class="btn-jtc mt-4">Pievienot preču sarakstam</button>
            </div>
            <div class="bg-gray-100 rounded-2xl flex items-center justify-center border-2 border-dashed border-gray-300 min-h-[200px]">
                <p class="text-gray-400 font-bold text-xs uppercase tracking-widest text-center px-6">Šeit tiks rādīts kameras logs skenēšanai</p>
            </div>
        </div>

        <table class="jtc-table">
            <thead>
                <tr>
                    <th>Prece</th>
                    <th>Atrašanās vieta</th>
                    <th>Cena</th>
                    <th>Daudzums</th>
                    <th>Svītrkods</th>
                    <th class="text-right">Darbība</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('JTC_STK')) || [];

    function login() {
        if(document.getElementById('pass').value === 'admin') {
            document.getElementById('login-screen').remove();
            document.getElementById('app').classList.remove('hidden');
            gen();
            render();
        }
    }

    function gen() { document.getElementById('ean').value = "JTC" + Math.floor(100000 + Math.random() * 899999); }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = stock.map((i, idx) => `
            <tr>
                <td class="text-lg">${i.n}</td>
                <td><span class="shelf-badge font-black">${i.sh || '-'}</span></td>
                <td class="text-green-600">${i.p} €</td>
                <td>${i.q} gab.</td>
                <td><svg id="b-${idx}" class="h-8 w-32"></svg></td>
                <td class="text-right">
                    <button class="text-blue-500 mr-4 text-xl"><i class="fas fa-print"></i></button>
                    <button onclick="del(${idx})" class="text-red-300 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
        
        stock.forEach((i, idx) => {
            JsBarcode(`#b-${idx}`, i.ean, { format: "CODE128", displayValue: false, height: 30, width: 1.5 });
        });
        localStorage.setItem('JTC_STK', JSON.stringify(stock));
    }

    function add() {
        const n=document.getElementById('n').value, p=document.getElementById('p').value, q=document.getElementById('q').value, sh=document.getElementById('sh').value, ean=document.getElementById('ean').value;
        if(n && p) {
            stock.unshift({n, p, q, sh, ean});
            render(); gen();
            document.getElementById('n').value=''; document.getElementById('p').value='';
        }
    }

    function del(idx) { if(confirm("Dzēst?")) { stock.splice(idx,1); render(); } }
</script>

</body>
</html>
                <button onclick="addCli()" class="btn-black col-span-2">Saglabāt</button>
            </div>
            <table class="w-full"><thead><tr><th>Vārds</th><th>Telefons</th><th>X</th></tr></thead><tbody id="cli-body"></tbody></table>
        </div>

        <div id="sys" class="tab-content">
            <h2 class="text-3xl font-black mb-8 italic">Datu Sinhronizācija</h2>
            <div class="card text-center">
                <p class="mb-6 text-gray-500">Izmanto šo, lai pārceltu datus no telefona uz datoru.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="exportData()" class="btn-black bg-green-600">1. Lejupielādēt datus (Backup)</button>
                    <div class="relative">
                        <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                        <button onclick="document.getElementById('importFile').click()" class="btn-black bg-blue-600">2. Augšupielādēt failu</button>
                    </div>
                </div>
                <button onclick="clearAllData()" class="mt-20 text-red-500 font-bold uppercase text-[10px]">Izdzēst visu atmiņu</button>
            </div>
        </div>
    </div>
</div>

<div id="print-area"></div>

<script>
let stock = [], repairs = [], clients = [];

function initSystem() {
    stock = JSON.parse(localStorage.getItem('JTC_STK')) || [];
    repairs = JSON.parse(localStorage.getItem('JTC_REP')) || [];
    clients = JSON.parse(localStorage.getItem('JTC_CLI')) || [];
    render();
}

function checkLogin() {
    if(document.getElementById('pass-input').value === 'admin') {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('admin-panel').style.display='block';
        genEAN();
    }
}

function genEAN() { document.getElementById('in-ean').value = "JTC" + Math.floor(100000 + Math.random() * 900000); }

function render() {
    document.getElementById('stk-body').innerHTML = stock.map((i, idx) => `<tr><td>${i.n}</td><td class="text-blue-600 font-black">${i.sh || '-'}</td><td>${i.p}€</td><td>${i.q}</td><td><svg id="bc-${idx}" class="barcode-small"></svg></td><td class="text-right"><button onclick="printOnlyEan(${idx})" class="text-blue-500 mr-4"><i class="fas fa-print"></i></button><button onclick="stock.splice(${idx},1);render()" class="text-red-400"><i class="fas fa-trash"></i></button></td></tr>`).join('');
    stock.forEach((i, idx) => JsBarcode(`#bc-${idx}`, i.ean, { format: "CODE128", width: 1, height: 25, displayValue: false }));
    
    document.getElementById('rep-body').innerHTML = repairs.map((r, idx) => `<tr><td>${r.nr}</td><td>${r.cl}</td><td>${r.jb}</td><td class="text-right"><button onclick="repairs.splice(${idx},1);render()" class="text-red-400">X</button></td></tr>`).join('');
    document.getElementById('cli-body').innerHTML = clients.map((c, idx) => `<tr><td>${c.nm}</td><td>${c.ph}</td><td class="text-right"><button onclick="clients.splice(${idx},1);render()" class="text-red-400">X</button></td></tr>`).join('');

    localStorage.setItem('JTC_STK', JSON.stringify(stock));
    localStorage.setItem('JTC_REP', JSON.stringify(repairs));
    localStorage.setItem('JTC_CLI', JSON.stringify(clients));
}

function addItem() {
    const n=document.getElementById('in-n').value, p=document.getElementById('in-p').value, q=document.getElementById('in-q').value, sh=document.getElementById('in-sh').value, ean=document.getElementById('in-ean').value;
    if(n && p) { stock.unshift({n, p, q, sh, ean}); render(); genEAN(); document.getElementById('in-n').value=''; document.getElementById('in-p').value=''; }
}

function addRep() {
    const nr=document.getElementById('r-nr').value;
    if(nr) { repairs.unshift({nr:nr.toUpperCase(), cl:document.getElementById('r-cl').value, jb:document.getElementById('r-jb').value}); render(); document.getElementById('r-nr').value=''; }
}

function addCli() {
    const nm=document.getElementById('c-nm').value;
    if(nm) { clients.unshift({nm, ph:document.getElementById('c-ph').value}); render(); document.getElementById('c-nm').value=''; }
}

function printOnlyEan(idx) {
    const i = stock[idx];
    document.getElementById('print-area').innerHTML = `<div style="width:40mm;padding:5px;text-align:center;color:black;background:white;"><div style="font-size:10px;font-weight:700;">${i.n}</div><svg id="pbc"></svg><div style="font-size:8px;">${i.ean}</div></div>`;
    JsBarcode("#pbc", i.ean, { format: "CODE128", width: 1.2, height: 35, displayValue: false });
    window.print();
}

function toggleScanner() {
    const con = document.getElementById('scanner-container');
    if(con.style.display === 'block') { Quagga.stop(); con.style.display = 'none'; }
    else {
        con.style.display = 'block';
        Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: con, constraints: { facingMode: "environment" } }, decoder: { readers: ["code_128_reader", "ean_reader"] } }, (err) => { if(!err) Quagga.start(); });
        Quagga.onDetected((d) => { document.getElementById('in-ean').value = d.codeResult.code; toggleScanner(); });
    }
}

function openTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    document.getElementById('btn-'+t).classList.add('active');
}

// EKSPORTA UN IMPORTA FUNKCIJAS
function exportData() {
    const data = { stock, repairs, clients };
    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `JTC_Dati_${new Date().toLocaleDateString()}.json`;
    a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = JSON.parse(e.target.result);
        if(confirm("Vai aizvietot esošos datus ar šī faila saturu?")) {
            stock = data.stock || [];
            repairs = data.repairs || [];
            clients = data.clients || [];
            render();
            alert("Dati veiksmīgi ielādēti!");
        }
    };
    reader.readAsText(event.target.files[0]);
}

function clearAllData() {
    if(confirm("DANGER! Tiks izdzēsti VISI dati! Turpināt?")) { localStorage.clear(); location.reload(); }
}
</script>
</body>
</html>
