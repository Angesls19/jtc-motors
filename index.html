<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JT MOTORS | ENTERPRISE v8.0.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        :root { --jt-yellow: #fbbf24; --jt-dark: #0f172a; --jt-card: #1e293b; }

        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; padding-top: 130px; }

        /* Login */
        #login-screen { background: var(--jt-dark); position: fixed; inset: 0; z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--jt-card); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Galvenes struktūra - FIKSĒTA */
        .fixed-header { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: var(--jt-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .logo-bar { height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-text { font-size: 24px; font-weight: 900; font-style: italic; text-transform: uppercase; color: white; }
        .logo-text span { color: var(--jt-yellow); }

        /* Horizontālā Izvēlne */
        .nav-bar { height: 65px; display: flex; overflow-x: auto; scrollbar-width: none; background: #1e293b; }
        .nav-bar::-webkit-scrollbar { display: none; }
        .nav-link { flex: 1; min-width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; opacity: 0.6; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav-link i { font-size: 18px; margin-bottom: 4px; }
        .nav-link.active { opacity: 1; color: var(--jt-yellow); border-bottom-color: var(--jt-yellow); background: rgba(255,255,255,0.05); }

        /* Saturs */
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .stat-card { background: var(--jt-card); color: white; padding: 15px; border-radius: 16px; text-align: center; border-bottom: 4px solid var(--jt-yellow); }
        
        /* Formas */
        input, select, textarea { border: 2px solid #e2e8f0; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; font-weight: 600; outline: none; }
        .btn-jt { background: var(--jt-yellow); color: #000; font-weight: 900; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; box-shadow: 0 4px 0 #d97706; transition: 0.2s; }
        .btn-jt:active { transform: translateY(2px); box-shadow: 0 2px 0 #d97706; }
        .btn-cancel { background: #94a3b8; color: white; font-weight: 900; padding: 14px; border-radius: 12px; width: 100%; text-transform: uppercase; box-shadow: 0 4px 0 #64748b; }

        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>

    <div id="print-area"></div>

    <div id="app-header-ui" class="fixed-header" style="display:none;">
        <div class="logo-bar">
            <div class="logo-text">JT <span>MOTORS</span></div>
        </div>
        <div class="nav-bar">
            <div onclick="showSection('stock')" id="n-stock" class="nav-link active"><i class="fas fa-boxes"></i><span>Noliktava</span></div>
            <div onclick="showSection('repairs')" id="n-repairs" class="nav-link"><i class="fas fa-tools"></i><span>Serviss</span></div>
            <div onclick="showSection('calendar')" id="n-calendar" class="nav-link"><i class="fas fa-calendar-alt"></i><span>Pieraksti</span></div>
            <div onclick="showSection('clients')" id="n-clients" class="nav-link"><i class="fas fa-users"></i><span>Klienti</span></div>
            <div onclick="showSection('history')" id="n-history" class="nav-link"><i class="fas fa-file-invoice-dollar"></i><span>Finanses</span></div>
            <div onclick="showSection('logs')" id="n-logs" class="nav-link"><i class="fas fa-history"></i><span>Žurnāls</span></div>
            <div onclick="logout()" class="nav-link !text-red-400"><i class="fas fa-power-off"></i><span>Iziet</span></div>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h1 class="logo-text">JT <span>MOTORS</span></h1>
            <input id="login-email" type="email" placeholder="E-PASTS" style="margin-top:20px;">
            <input id="login-pass" type="password" placeholder="KODS">
            <button onclick="checkLogin()" class="btn-jt mt-4">Ienākt</button>
            <p id="login-error" class="text-red-500 text-xs mt-4 font-bold hidden">Nepareizi dati!</p>
        </div>
    </div>

    <div id="app-content" class="main-content" style="display:none;">
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
            <div id="box-val" class="stat-card"><p class="text-[9px] opacity-60 uppercase">Noliktava Bruto</p><h2 id="stat-value" class="text-lg font-black text-blue-400">0€</h2></div>
            <div id="box-money" class="stat-card"><p class="text-[9px] opacity-60 uppercase">Peļņa</p><h2 id="stat-money" class="text-lg font-black text-green-400">0€</h2></div>
            <div id="box-debt" class="stat-card"><p class="text-[9px] opacity-60 uppercase">Parādi</p><h2 id="stat-debts" class="text-lg font-black text-red-400">0€</h2></div>
            <div class="stat-card"><p class="text-[9px] opacity-60 uppercase">Servisā</p><h2 id="stat-repairs" class="text-lg font-black text-yellow-500">0</h2></div>
            <div class="stat-card"><p class="text-[9px] opacity-60 uppercase">Preces</p><h2 id="stat-qty" class="text-lg font-black">0</h2></div>
            <div class="stat-card"><p class="text-[9px] opacity-60 uppercase">Klienti</p><h2 id="stat-clients" class="text-lg font-black">0</h2></div>
        </div>

        <div id="reader" class="hidden w-full max-w-sm mx-auto mb-4 border-4 border-blue-500 rounded-xl overflow-hidden"></div>

        <div id="sec-stock" class="section">
            <div class="card border-2 border-slate-200">
                <h3 class="font-black uppercase text-sm mb-4"><i class="fas fa-plus-circle text-yellow-500"></i> Preces Pievienošana</h3>
                <input type="hidden" id="st-id-edit"> 
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="st-n" placeholder="Preces nosaukums">
                    <div class="flex gap-2">
                        <input id="st-p" type="number" placeholder="Cena €">
                        <select id="st-vat" class="w-1/3"><option value="21">21%</option><option value="0">0%</option></select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="st-q" type="number" placeholder="Skaits">
                        <input id="st-l" placeholder="Plaukts">
                    </div>
                    <div class="flex gap-2">
                        <input id="st-e-1" placeholder="EAN Kods (Auto)">
                        <button onclick="toggleScanner('st-e-1')" class="bg-blue-600 text-white px-4 rounded-xl mb-[10px]"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
                <div class="flex gap-3 mt-2">
                    <button id="st-btn-save" onclick="addStock()" class="btn-jt flex-1">Saglabāt</button>
                    <button id="st-btn-cancel" onclick="resetStockForm()" class="btn-cancel flex-1 hidden">Atcelt</button>
                </div>
            </div>

            <div class="card flex gap-3 !p-3">
                <input id="stock-search" onkeyup="filterStock()" placeholder="Meklēt pēc nosaukuma vai EAN..." class="!mb-0">
                <button onclick="toggleScanner('stock-search', true)" class="bg-blue-600 text-white px-6 rounded-xl"><i class="fas fa-barcode"></i></button>
            </div>

            <div class="card !p-0 overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr><th class="p-4">Prece</th><th class="p-4">Plaukts</th><th class="p-4">Cena</th><th class="p-4">Skaits</th><th class="p-4 text-right">Darbības</th></tr>
                    </thead>
                    <tbody id="stock-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-repairs" class="section hidden">
            <div class="card bg-slate-900 text-white">
                <h3 class="font-black uppercase mb-4">Jauns Darbs</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <select id="rep-make" onchange="updateModels()" class="text-black"></select>
                    <select id="rep-model" disabled class="text-black opacity-50"></select>
                    <select id="rep-year" class="text-black"></select>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="rep-nr" placeholder="VALSTS NUMURS" class="uppercase font-black text-black">
                    <input id="rep-cl" placeholder="KLIENTS" class="text-black">
                    <input id="rep-phone" placeholder="TELEFONS" class="text-black">
                    <input id="rep-price" type="number" placeholder="DARBA CENA €" class="text-black">
                </div>
                <select id="rep-part-select" class="text-black mt-4"></select>
                <textarea id="rep-task" class="text-black mt-2" placeholder="VEIKTIE DARBI..."></textarea>
                <button onclick="addRepair()" class="btn-jt mt-4">Pievienot Servisā</button>
            </div>
            <div id="repair-list" class="space-y-4 mt-6"></div>
        </div>

        <div id="sec-clients" class="section hidden">
            <div class="card">
                <h3 class="font-black uppercase mb-4">Klients</h3>
                <input type="hidden" id="c-id-edit">
                <input id="c-name" placeholder="Vārds / Uzņēmums">
                <input id="c-phone" placeholder="Telefons">
                <div class="flex gap-2">
                    <button id="c-btn-save" onclick="addClient()" class="btn-jt">Saglabāt</button>
                    <button id="c-btn-cancel" onclick="resetClientForm()" class="btn-cancel hidden">Atcelt</button>
                </div>
            </div>
            <div id="client-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6"></div>
        </div>

        <div id="sec-calendar" class="section hidden">
            <div class="card bg-slate-800">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="cal-date" type="date">
                    <input id="cal-nr" placeholder="Auto Nr." class="uppercase">
                </div>
                <textarea id="cal-task" placeholder="Darbu apraksts..." class="mt-2"></textarea>
                <button onclick="addCalendar()" class="btn-jt mt-2">Rezervēt laiku</button>
            </div>
            <div id="calendar-items" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6"></div>
        </div>

        <div id="sec-history" class="section hidden">
            <div class="card !p-0 overflow-hidden">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50">
                        <tr><th class="p-4">Auto</th><th class="p-4">Klients</th><th class="p-4">Summa</th><th class="p-4 text-right">Drukāt</th></tr>
                    </thead>
                    <tbody id="history-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-logs" class="section hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">Sistēmas darbības</h3>
                <button id="btn-clear-logs" onclick="clearLogs()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-xs font-bold hidden">DZĒST ŽURNĀLU</button>
            </div>
            <div id="logs-container" class="card font-mono text-[10px] h-[500px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyBK20atH4pmEORbuHLCTAXaSCPUBfz9190", databaseURL: "https://jtc-motors-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database();
        const auth = firebase.auth();

        let allStockData = {}, allClientData = {}, currentUserRole = "", html5QrCode = null;

        const carData = { "Audi":["A3","A4","A6","Q5","Q7"],"BMW":["3 Series","5 Series","X5"],"VW":["Golf","Passat","Tiguan"],"Volvo":["XC60","XC90"],"Mercedes":["C-Class","E-Class","Sprinter"],"Toyota":["Corolla","RAV4"],"CITS":["IERAKSTĪT PAŠAM"] };

        // AUTH
        async function checkLogin() {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { document.getElementById('login-error').classList.remove('hidden'); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if(user) {
                const e = user.email.toLowerCase();
                currentUserRole = (e === "i.ozolins.apsitis@gmail.com") ? "Admin" : (e.includes("janis") ? "Janis" : "Meistars");
                document.getElementById('login-screen').style.display='none';
                document.getElementById('app-header-ui').style.display='block';
                document.getElementById('app-content').style.display='block';
                applyPermissions(); initCarSelectors(); loadAll();
                logAction("Pieslēdzās");
            } else { document.getElementById('login-screen').style.display='flex'; }
        });

        function applyPermissions() {
            const isAdmin = currentUserRole === "Admin";
            const isFin = (isAdmin || currentUserRole === "Janis");
            document.getElementById('n-logs').style.display = isAdmin ? "flex" : "none";
            document.getElementById('btn-clear-logs').style.display = isAdmin ? "block" : "none";
            document.getElementById('n-history').style.display = isFin ? "flex" : "none";
            document.getElementById('n-clients').style.display = isFin ? "flex" : "none";
            ['box-val','box-money','box-debt'].forEach(id => document.getElementById(id).style.display = isFin ? "block" : "none");
        }

        // KOPĒJĀS
        function loadAll() { loadStock(); loadRepairs(); loadCalendar(); loadClients(); loadHistory(); loadLogs(); }
        function logAction(msg) { if(auth.currentUser) db.ref('logs').push({time: new Date().toLocaleString('lv-LV'), user: currentUserRole, info: msg}); }
        function showSection(s) {
            document.querySelectorAll('.section').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            document.getElementById('n-'+s).classList.add('active');
            window.scrollTo(0,0);
        }

        // NOLIKTAVA & EAN
        function loadStock() { 
            db.ref('stock').on('value', s => { 
                allStockData = s.val() || {}; 
                filterStock(); 
                updateStats(); 
            }); 
        }

        function filterStock() {
            const q = document.getElementById('stock-search').value.toLowerCase();
            let h = '', opt = '<option value="">-- Izvēlēties detaļu --</option>';
            Object.keys(allStockData).forEach(id => {
                const i = allStockData[id];
                if(i.n.toLowerCase().includes(q) || (i.e && i.e[0].includes(q))) {
                    h += `<tr class="border-b">
                        <td class="p-4 font-bold">${i.n}</td>
                        <td class="p-4 text-slate-500">${i.l || '-'}</td>
                        <td class="p-4">${i.p.toFixed(2)}€</td>
                        <td class="p-4 font-bold text-blue-600">${i.q}</td>
                        <td class="p-4 text-right flex justify-end gap-3">
                            <button onclick="printEan('${i.e ? i.e[0] : ''}', '${i.n}')" class="text-slate-500"><i class="fas fa-barcode"></i></button>
                            <button onclick="prepareEditStock('${id}')" class="text-blue-500"><i class="fas fa-edit"></i></button>
                            <button onclick="safeDelete('stock/${id}', 'Preci', '${i.n}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                    opt += `<option value="${id}">${i.n} (${i.q} gab)</option>`;
                }
            });
            document.getElementById('stock-table').innerHTML = h;
            document.getElementById('rep-part-select').innerHTML = opt;
        }

        function printEan(code, name) {
            if(!code) return alert("Nav koda!");
            const area = document.getElementById('print-area');
            area.innerHTML = `<div style="text-align:center; padding:20px; background:white;"><p style="font-weight:bold;">${name}</p><svg id="barcode"></svg></div>`;
            JsBarcode("#barcode", code, { displayValue: true });
            setTimeout(() => { window.print(); area.innerHTML = ""; }, 500);
        }

        function addStock() {
            const id = document.getElementById('st-id-edit').value;
            const n = document.getElementById('st-n').value, p = document.getElementById('st-p').value, q = document.getElementById('st-q').value;
            if(!n || !p) return alert("Dati?");
            const data = { n, p: parseFloat(p), q: parseInt(q||0), l: document.getElementById('st-l').value, vat: parseInt(document.getElementById('st-vat').value), e: [document.getElementById('st-e-1').value || generateEan()] };
            if(id) db.ref('stock/'+id).update(data); else db.ref('stock').push(data);
            resetStockForm();
        }

        function prepareEditStock(id) {
            const i = allStockData[id];
            document.getElementById('st-id-edit').value = id;
            document.getElementById('st-n').value = i.n;
            document.getElementById('st-p').value = i.p;
            document.getElementById('st-q').value = i.q;
            document.getElementById('st-l').value = i.l || '';
            document.getElementById('st-e-1').value = i.e ? i.e[0] : '';
            document.getElementById('st-btn-cancel').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetStockForm() { document.getElementById('st-id-edit').value=''; document.querySelectorAll('#sec-stock input').forEach(i=>i.value=''); document.getElementById('st-btn-cancel').classList.add('hidden'); }

        // KLIENTI
        function loadClients() {
            db.ref('clients').on('value', s => {
                allClientData = s.val() || {};
                let h = ''; let count = 0;
                Object.keys(allClientData).forEach(id => {
                    count++; const c = allClientData[id];
                    h += `<div class="card relative">
                        <div class="absolute top-3 right-3 flex gap-2">
                            <button onclick="prepareEditClient('${id}')" class="text-blue-500"><i class="fas fa-edit"></i></button>
                            <button onclick="safeDelete('clients/${id}', 'Klientu', '${c.name}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="font-black text-lg">${c.name}</div>
                        <div class="text-blue-600 font-bold">${c.phone || '-'}</div>
                    </div>`;
                });
                document.getElementById('client-grid').innerHTML = h;
                document.getElementById('stat-clients').innerText = count;
            });
        }

        function addClient() {
            const id = document.getElementById('c-id-edit').value;
            const n = document.getElementById('c-name').value, p = document.getElementById('c-phone').value;
            if(!n) return alert("Vārds?");
            if(id) db.ref('clients/'+id).update({name:n, phone:p}); else db.ref('clients').push({name:n, phone:p});
            resetClientForm();
        }

        function prepareEditClient(id) {
            const c = allClientData[id];
            document.getElementById('c-id-edit').value = id;
            document.getElementById('c-name').value = c.name;
            document.getElementById('c-phone').value = c.phone || '';
            document.getElementById('c-btn-cancel').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetClientForm() { document.getElementById('c-id-edit').value=''; document.getElementById('c-name').value=''; document.getElementById('c-phone').value=''; document.getElementById('c-btn-cancel').classList.add('hidden'); }

        // SERVISS
        function initCarSelectors() {
            const m = document.getElementById('rep-make'), y = document.getElementById('rep-year');
            let mH = '<option value="">MARKA</option>', yH = '<option value="">GADS</option>';
            Object.keys(carData).sort().forEach(x => mH += `<option value="${x}">${x}</option>`);
            for(let i=2026; i>=1990; i--) yH += `<option value="${i}">${i}</option>`;
            m.innerHTML = mH; y.innerHTML = yH;
        }

        function updateModels() {
            const m = document.getElementById('rep-make').value;
            const s = document.getElementById('rep-model');
            if(!m) { s.disabled=true; return; }
            s.disabled=false; s.classList.remove('opacity-50');
            let h = '<option value="">MODELIS</option>';
            carData[m].forEach(x => h += `<option value="${x}">${x}</option>`);
            s.innerHTML = h;
        }

        function addRepair() {
            const nr = document.getElementById('rep-nr').value, pId = document.getElementById('rep-part-select').value;
            if(!nr) return alert("Numurs!");
            const entry = { nr, cl: document.getElementById('rep-cl').value, price: parseFloat(document.getElementById('rep-price').value||0), task: document.getElementById('rep-task').value, date: new Date().toLocaleString('lv-LV') };
            if(pId) {
                const i = allStockData[pId];
                db.ref('stock/'+pId).update({q: i.q-1});
                entry.price += (i.vat > 0 ? i.p * 1.21 : i.p);
                entry.task += ` (+ ${i.n})`;
            }
            db.ref('repairs').push(entry);
            alert("Pievienots!");
        }

        function loadRepairs() {
            db.ref('repairs').on('value', s => {
                let h = '', count = 0;
                s.forEach(x => {
                    count++; const r = x.val();
                    h += `<div class="card border-l-8 border-yellow-500 flex justify-between items-center">
                        <div><h2 class="text-xl font-black">${r.nr}</h2><p class="text-xs opacity-60">${r.cl} • ${r.task}</p></div>
                        <button onclick="finishRepair('${x.key}')" class="bg-green-600 text-white px-5 py-2 rounded-xl font-bold">GATAVS</button>
                    </div>`;
                });
                document.getElementById('repair-list').innerHTML = h;
                document.getElementById('stat-repairs').innerText = count;
            });
        }

        function finishRepair(id) { 
            db.ref('repairs/'+id).once('value', s => { 
                db.ref('history').push(s.val()); 
                db.ref('repairs/'+id).remove(); 
                logAction("Pabeidza: " + s.val().nr);
            }); 
        }

        function loadHistory() {
            db.ref('history').on('value', s => {
                let h = '', total = 0;
                s.forEach(x => {
                    const r = x.val(); total += r.price;
                    h = `<tr class="border-b"><td class="p-4 font-bold">${r.nr}</td><td class="p-4 text-xs">${r.cl}</td><td class="p-4 font-bold text-green-600">${r.price.toFixed(2)}€</td><td class="p-4 text-right"><button onclick="printInv('${x.key}')" class="text-slate-400"><i class="fas fa-print"></i></button></td></tr>` + h;
                });
                document.getElementById('history-table').innerHTML = h;
                document.getElementById('stat-money').innerText = total.toFixed(2) + "€";
            });
        }

        // ŽURNĀLS
        function loadLogs() { db.ref('logs').limitToLast(100).on('value', s => { let h = ''; s.forEach(x => { const l = x.val(); h = `<div class="p-1 border-b"><b>[${l.time}]</b> ${l.user}: ${l.info}</div>` + h; }); document.getElementById('logs-container').innerHTML = h; }); }
        function clearLogs() { if(confirm("Dzēst visu?")) db.ref('logs').remove(); }

        // PIERAKSTI
        function loadCalendar() { db.ref('calendar').on('value', s => { let h = ''; s.forEach(x => { const c = x.val(); h += `<div class="card relative"><button onclick="safeDelete('calendar/${x.key}', 'Pierakstu', '${c.nr}')" class="absolute top-2 right-2 text-red-400"><i class="fas fa-times"></i></button><h3 class="font-black">${c.nr}</h3><p class="text-sm">${c.date}<br>${c.task}</p></div>`; }); document.getElementById('calendar-items').innerHTML = h; }); }
        function addCalendar() { const d = document.getElementById('cal-date').value, nr = document.getElementById('cal-nr').value; if(d && nr) db.ref('calendar').push({date:d, nr, task:document.getElementById('cal-task').value}); }

        // SKENERIS & PALĪGI
        async function toggleScanner(targetId, isSearch = false) {
            const r = document.getElementById('reader');
            if(html5QrCode && html5QrCode.isScanning) { await html5QrCode.stop(); r.classList.add('hidden'); return; }
            r.classList.remove('hidden'); html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, text => {
                document.getElementById(targetId).value = text;
                html5QrCode.stop(); r.classList.add('hidden');
                if(isSearch) filterStock();
            });
        }

        function updateStats() { let v = 0, q = 0; Object.values(allStockData).forEach(i => { v += (i.q * (i.vat > 0 ? i.p * 1.21 : i.p)); q += i.q; }); document.getElementById('stat-value').innerText = v.toFixed(2)+"€"; document.getElementById('stat-qty').innerText = q; }
        function safeDelete(p, t, n) { if(confirm(`Dzēst ${t} ${n}?`)) { db.ref(p).remove(); logAction(`Dzēsa ${t}: ${n}`); } }
        function generateEan() { return "26" + Math.floor(Math.random() * 10000000000); }
        function printInv(id) { db.ref('history/'+id).once('value', s => { const r = s.val(); const area = document.getElementById('print-area'); area.innerHTML = `<div style="padding:50px;"><h1>JT MOTORS</h1><hr><p>Auto: ${r.nr}</p><p>Klients: ${r.cl}</p><p>Darbība: ${r.task}</p><h2>KOPĀ: ${r.price.toFixed(2)}€</h2></div>`; setTimeout(() => { window.print(); area.innerHTML=""; }, 500); }); }
    </script>
</body>
</html>
