<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JT MOTORS | ENTERPRISE v7.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; }
        #login-screen { background: #0f172a; position: fixed; inset: 0; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        #login-pass { background: white !important; color: black !important; font-size: 24px; text-align: center; border: 4px solid #fbbf24; margin-top: 20px; border-radius: 12px; width: 100%; padding: 15px; }
        .sidebar { background: #0f172a; color: white; height: 100vh; position: fixed; width: 260px; z-index: 50; display: flex; flex-direction: column; }
        .nav-link { display: flex; align-items: center; padding: 15px 25px; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; font-weight: 600; opacity: 0.7; }
        .nav-link.active { background: #1e293b; border-left-color: #fbbf24; opacity: 1; color: #fbbf24; }
        .main-content { margin-left: 260px; padding: 30px; min-height: 100vh; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .main-content { margin-left: 70px; } .nav-link span { display: none; } }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .btn-jt { background: #fbbf24; color: #000; font-weight: 900; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; border: none; text-transform: uppercase; }
        input, select, textarea { border: 2px solid #e2e8f0; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; outline: none; }
        .stat-card { background: #1e293b; color: white; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid #fbbf24; }
        .low-stock { color: #ef4444 !important; font-weight: 900; animation: pulse 2s infinite; }
        .ean-tag { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; margin: 2px; display: inline-block; }
        .photo-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #e2e8f0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body onload="document.getElementById('login-pass').focus()">

    <div id="login-screen">
        <div class="login-box">
            <h1 class="text-4xl font-black italic text-white">JT <span class="text-yellow-500">MOTORS</span></h1>
            <input id="login-pass" type="password" placeholder="KODS">
            <button onclick="checkLogin()" class="btn-jt mt-4">Ienākt</button>
        </div>
    </div>

    <div id="app-sidebar" class="sidebar" style="display:none;">
        <div class="p-8 text-2xl font-black italic text-yellow-500 border-b border-white/5 text-center">JT MOTORS</div>
        <nav class="flex-1 mt-4 flex flex-col">
            <div onclick="showSection('stock')" id="n-stock" class="nav-link active"><i class="fas fa-boxes mr-4 w-6"></i> <span>Noliktava</span></div>
            <div onclick="showSection('repairs')" id="n-repairs" class="nav-link"><i class="fas fa-tools mr-4 w-6"></i> <span>Serviss</span></div>
            <div onclick="showSection('calendar')" id="n-calendar" class="nav-link"><i class="fas fa-calendar-alt mr-4 w-6"></i> <span>Pieraksti</span></div>
            <div onclick="showSection('clients')" id="n-clients" class="nav-link"><i class="fas fa-users mr-4 w-6"></i> <span>Klienti</span></div>
            <div id="nav-history" onclick="showSection('history')" class="nav-link" style="display:none;"><i class="fas fa-file-invoice-dollar mr-4 w-6"></i> <span>Finanses</span></div>
            <div id="nav-logs" onclick="showSection('logs')" class="nav-link" style="display:none;"><i class="fas fa-history mr-4 w-6"></i> <span>Žurnāls</span></div>
            <div onclick="location.reload()" class="nav-link !text-red-500 border-t border-white/10 mt-auto mb-5"><i class="fas fa-power-off mr-4 w-6"></i> <span>IZIET</span></div>
        </nav>
    </div>

    <div id="app-content" class="main-content" style="display:none;">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
            <div id="box-val" class="stat-card"><p class="text-[9px] opacity-60 uppercase">Vērtība</p><h2 id="stat-value" class="text-xl font-black text-blue-400">0€</h2></div>
            <div id="box-money" class="stat-card"><p class="text-[9px] opacity-60 uppercase">Peļņa</p><h2 id="stat-money" class="text-xl font-black text-green-400">0€</h2></div>
            <div id="box-debt" class="stat-card"><p class="text-[9px] opacity-60 uppercase">Parādi</p><h2 id="stat-debts" class="text-xl font-black text-red-400">0€</h2></div>
            <div class="stat-card"><p class="text-[9px] opacity-60 uppercase">Servisā</p><h2 id="stat-repairs" class="text-xl font-black text-yellow-500">0</h2></div>
            <div class="stat-card"><p class="text-[9px] opacity-60 uppercase">Preces</p><h2 id="stat-qty" class="text-xl font-black">0</h2></div>
            <div class="stat-card"><p class="text-[9px] opacity-60 uppercase">Klienti</p><h2 id="stat-clients" class="text-xl font-black">0</h2></div>
        </div>

        <div id="reader" class="hidden rounded-2xl border-4 border-yellow-500 mb-6 bg-black"></div>

        <div id="sec-stock" class="section">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="card h-fit lg:sticky lg:top-6">
                    <h3 class="font-black mb-4 uppercase text-xs text-slate-400">Pievienot Preci</h3>
                    <input id="st-n" placeholder="Nosaukums">
                    <div class="flex gap-2"><input id="st-p" type="number" placeholder="Cena"><input id="st-q" type="number" placeholder="Skaits"></div>
                    <input id="st-l" placeholder="Plaukts">
                    <div id="ean-inputs" class="space-y-2 mb-2">
                        <div class="flex gap-2"><input id="st-e-1" class="st-ean-list !mb-0" placeholder="EAN"><button onclick="toggleScanner('st-e-1')" class="bg-blue-600 text-white px-3 rounded-lg"><i class="fas fa-camera"></i></button></div>
                    </div>
                    <button onclick="addEanField()" class="text-[10px] font-bold text-blue-600 mb-4 block">+ CITS EAN</button>
                    <button onclick="addStock()" class="btn-jt w-full">Saglabāt</button>
                </div>
                <div class="lg:col-span-3">
                    <div class="card mb-4 flex gap-2 !p-2">
                        <input id="stock-search" onkeyup="filterStock()" placeholder="Meklēt..." class="!mb-0 h-12 flex-1 border-none bg-slate-50">
                        <button onclick="toggleScanner('stock-search', true)" class="bg-blue-600 text-white px-6 rounded-xl"><i class="fas fa-barcode text-xl"></i></button>
                    </div>
                    <div class="card !p-0 overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50 border-b text-xs uppercase text-slate-400">
                                <tr><th class="p-4 text-left">Prece</th><th class="p-4 text-left">Vieta</th><th class="p-4 text-left">Cena</th><th class="p-4 text-left">Skaits</th><th class="p-4 text-left">EAN</th><th class="p-4 text-right"></th></tr>
                            </thead>
                            <tbody id="stock-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="sec-repairs" class="section hidden">
            <div class="card grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-800">
                <input id="rep-nr" placeholder="Auto Nr." class="uppercase">
                <input id="rep-cl" placeholder="Klients">
                <input id="rep-price" type="number" placeholder="Cena">
                <select id="rep-part-select"></select>
                <textarea id="rep-task" class="md:col-span-4" placeholder="Apraksts..."></textarea>
                <button onclick="addRepair()" class="btn-jt md:col-span-4">Pievienot Servisā</button>
            </div>
            <div id="repair-list" class="space-y-4"></div>
        </div>

        <div id="sec-calendar" class="section hidden"><div id="calendar-items" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></div>
        <div id="sec-clients" class="section hidden"><div id="client-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
        <div id="sec-history" class="section hidden"><div class="card !p-0 overflow-hidden"><table class="w-full text-sm"><tbody id="history-table"></tbody></table></div></div>
        <div id="sec-logs" class="section hidden"><div id="logs-container" class="card space-y-2 text-[10px]"></div></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBK20atH4pmEORbuHLCTAXaSCPUBfz9190", authDomain: "jtc-motors.firebaseapp.com", databaseURL: "https://jtc-motors-default-rtdb.europe-west1.firebasedatabase.app", projectId: "jtc-motors" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        let html5QrCode = null, allStockData = {}, currentUser = "";

        function checkLogin() {
            const p = document.getElementById('login-pass').value;
            if(p === "globus@2026") { currentUser="Admin"; document.getElementById('nav-history').style.display='flex'; document.getElementById('nav-logs').style.display='flex'; }
            else if(p === "JTC-ADMIN-2026") { currentUser="Birojs"; document.getElementById('nav-history').style.display='flex'; }
            else if(p === "JTC-MEISTARS") { currentUser="Meistars"; document.getElementById('box-val').style.display='none'; document.getElementById('box-money').style.display='none'; document.getElementById('box-debt').style.display='none'; }
            else { alert("Kļūda!"); return; }
            document.getElementById('login-screen').style.display='none'; document.getElementById('app-sidebar').style.display='flex'; document.getElementById('app-content').style.display='block';
            loadAll();
        }

        function loadAll() { loadStock(); loadRepairs(); loadCalendar(); loadClients(); loadHistory(); loadLogs(); }

        // NOLIKTAVA AR EAN DRUKĀŠANU UN LABOŠANU
        function loadStock() { db.ref('stock').on('value', s => { allStockData = s.val() || {}; filterStock(); updateStats(); }); }
        
        function filterStock() {
            const q = document.getElementById('stock-search').value.toLowerCase();
            let h = '', opt = '<option value="">-- Bez detaļas --</option>';
            Object.keys(allStockData).forEach(id => {
                let i = allStockData[id]; 
                let eans = Array.isArray(i.e) ? i.e : [i.e];
                if(i.n.toLowerCase().includes(q) || eans.some(e => String(e).includes(q))) {
                    let isLow = i.q <= 3;
                    let eHtml = eans.map(e => `<span class="ean-tag" onclick="printEAN('${i.n.replace(/'/g, "\\'")}','${e}')"><i class="fas fa-print opacity-30"></i> ${e}</span>`).join(' ');
                    h += `<tr class="border-b"><td class="p-4 font-bold">${i.n}</td><td class="p-4 text-xs font-bold bg-blue-50/50">${i.l||'-'}</td><td class="p-4 font-bold">${i.p}€</td><td class="p-4 ${isLow ? 'low-stock' : 'font-black'}">${i.q} gab</td><td class="p-4">${eHtml}</td><td class="p-4 text-right">
                        <i onclick="editStock('${id}', '${i.n}', ${i.q}, ${i.p})" class="fas fa-edit text-blue-500 cursor-pointer mr-3"></i>
                        <i onclick="safeDelete('stock/${id}', 'Preci', '${i.n}')" class="fas fa-trash-alt text-red-400 cursor-pointer"></i>
                    </td></tr>`;
                    opt += `<option value="${id}">${i.n} (${i.q} gab)</option>`;
                }
            });
            document.getElementById('stock-table').innerHTML = h; document.getElementById('rep-part-select').innerHTML = opt;
        }

        function editStock(id, name, q, p) { let nq=prompt("Jaunais skaits:", q), np=prompt("Jaunā cena:", p); if(nq!==null && np!==null) db.ref('stock/'+id).update({q:parseInt(nq), p:parseFloat(np)}); }

        // FOTO UN SERVISS
        function triggerPhoto(id) {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = () => {
                    db.ref('repairs/'+id+'/photos').once('value', s => {
                        let current = s.val() || []; current.push(reader.result);
                        db.ref('repairs/'+id).update({ photos: current });
                    });
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function loadRepairs() {
            db.ref('repairs').on('value', s => {
                let h=''; let count=0;
                s.forEach(c => {
                    count++; let r=c.val(); let phHtml = '';
                    if(r.photos) r.photos.forEach(p => phHtml += `<img src="${p}" class="photo-preview" onclick="window.open('${p}')">`);
                    h += `<div class="card border-l-8 border-yellow-500">
                        <div class="flex justify-between items-start">
                            <div><h2 class="text-xl font-black">${r.nr}</h2><p class="text-sm font-bold text-slate-500">${r.cl} | ${r.price}€</p><p class="text-xs italic mt-1">${r.task}</p></div>
                            <div class="flex gap-2">
                                <button onclick="triggerPhoto('${c.key}')" class="bg-blue-100 text-blue-600 px-3 py-2 rounded-lg text-xs font-bold"><i class="fas fa-camera"></i> FOTO</button>
                                <button onclick="finishRepair('${c.key}')" class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md">GATAVS</button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3">${phHtml}</div>
                    </div>`;
                });
                document.getElementById('repair-list').innerHTML=h; document.getElementById('stat-repairs').innerText=count;
            });
        }

        // STANDARTA FUNKCIJAS
        function printEAN(name, code) { const w = window.open('', '', 'width=400,height=400'); w.document.write(`<html><body style="text-align:center;padding:40px;font-family:sans-serif;"><h2>${name}</h2><svg id="barcode"></svg><div style="font-weight:bold;margin-top:5px;font-size:20px;">${code}</div><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"><\/script><script>JsBarcode("#barcode","${code}",{format:"CODE128",width:2.5,height:70,displayValue:false});setTimeout(()=>{window.print();window.close();},400);<\/script></body></html>`); }
        function finishRepair(id) { db.ref('repairs/'+id).once('value', s => { db.ref('history').push(s.val()); db.ref('repairs/'+id).remove(); }); }
        function addRepair() { let nr=document.getElementById('rep-nr').value.toUpperCase(), cl=document.getElementById('rep-cl').value, pr=parseFloat(document.getElementById('rep-price').value || 0), task=document.getElementById('rep-task').value, partId=document.getElementById('rep-part-select').value; if(!nr) return; const entry = { nr, cl, price: pr, task, date: new Date().toLocaleString(), photos: [] }; if(partId) { db.ref('stock/'+partId).once('value', s => { let i=s.val(); db.ref('stock/'+partId).update({q: i.q-1}); entry.price += parseFloat(i.p); entry.partName = i.n; db.ref('repairs').push(entry); }); } else { entry.partName = 'Bez detaļas'; db.ref('repairs').push(entry); } }
        function updateStats() { let tv=0, tq=0, low=0; Object.values(allStockData).forEach(i=>{ tv+=(i.p*i.q); tq+=i.q; if(i.q<=3) low++; }); document.getElementById('stat-value').innerText=tv.toFixed(2)+"€"; document.getElementById('stat-qty').innerHTML=low>0?`${tq} <i class="fas fa-exclamation-triangle text-red-500"></i>`:tq; }
        function showSection(s) { document.querySelectorAll('.section').forEach(x=>x.classList.add('hidden')); document.querySelectorAll('.nav-link').forEach(x=>x.classList.remove('active')); document.getElementById('sec-'+s).classList.remove('hidden'); document.getElementById('n-'+s).classList.add('active'); }
        function safeDelete(p, t, i) { if(confirm(`Dzēst ${t}: ${i}?`)) db.ref(p).remove(); }
        function addStock() { let n=document.getElementById('st-n').value, p=document.getElementById('st-p').value, q=document.getElementById('st-q').value, l=document.getElementById('st-l').value; let eans = []; document.querySelectorAll('.st-ean-list').forEach(el => { if(el.value.trim()!=="") eans.push(el.value.trim()); }); if(n && p && q) db.ref('stock').push({n, p, q: parseInt(q), l, e: eans.length?eans:[Date.now()]}); }
        function addEanField() { const id='ean-'+Date.now(); const div=document.createElement('div'); div.className='flex gap-2'; div.innerHTML=`<input id="${id}" class="st-ean-list !mb-0" placeholder="EAN"><button onclick="toggleScanner('${id}')" class="bg-blue-600 text-white px-3 rounded-lg"><i class="fas fa-camera"></i></button>`; document.getElementById('ean-inputs').appendChild(div); }
        async function toggleScanner(inputId, isSearch = false) { const r = document.getElementById('reader'); if (html5QrCode && html5QrCode.isScanning) { await html5QrCode.stop(); r.classList.add('hidden'); return; } r.classList.remove('hidden'); html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, (text) => { document.getElementById(inputId).value = text; html5QrCode.stop(); r.classList.add('hidden'); if(isSearch) filterStock(); }).catch(() => { r.classList.add('hidden'); }); }
        function loadCalendar() { db.ref('calendar').on('value', s => { let h = ''; s.forEach(c => { let cal = c.val(); h += `<div class="card border-l-8 border-yellow-500"><div class="flex justify-between"><span class="text-[10px] font-bold">${cal.date}</span><i onclick="safeDelete('calendar/${c.key}','Pierakstu','${cal.nr}')" class="fas fa-trash-alt text-red-400"></i></div><h3 class="font-black">${cal.nr}</h3><p class="text-sm">${cal.task}</p></div>`; }); document.getElementById('calendar-items').innerHTML = h; }); }
        function loadClients() { db.ref('clients').on('value', s => { let h=''; s.forEach(c=>{ let cl=c.val(); h+=`<div class="card text-center relative border-t-4 border-slate-700"><i onclick="safeDelete('clients/${c.key}','Klientu','${cl.name}')" class="fas fa-trash-alt text-red-400 absolute top-2 right-2"></i><div class="font-black">${cl.name}</div><div class="text-[10px] opacity-50">${cl.auto}</div><a href="tel:${cl.phone}" class="bg-slate-800 text-white block py-2 mt-3 rounded-lg text-xs font-bold uppercase">Zvanīt</a></div>`; }); document.getElementById('client-grid').innerHTML=h; }); }
        function loadHistory() { db.ref('history').on('value', s => { let h = ''; s.forEach(c => { let r=c.val(); h = `<tr class="border-b"><td class="p-4 font-bold">${r.nr}</td><td class="p-4">${r.cl}</td><td class="p-4 font-black text-green-600">${r.price}€</td><td class="p-4 text-right"><i onclick="safeDelete('history/${c.key}','Vēsturi','${r.nr}')" class="fas fa-trash-alt text-red-500"></i></td></tr>` + h; }); document.getElementById('history-table').innerHTML = h; }); }
        function loadLogs() { db.ref('logs').limitToLast(10).on('value', s => { let h = ''; s.forEach(c => { let l = c.val(); h = `<div>${l.time}: ${l.info}</div>` + h; }); document.getElementById('logs-container').innerHTML = h; }); }
    </script>
</body>
</html>
