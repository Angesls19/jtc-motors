<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTC MOTORS | LIVE SYSTEM V2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .sidebar { width: 260px; background: #000; height: 100vh; position: fixed; padding: 30px 20px; color: #fff; z-index: 100; transition: 0.3s; }
        .main-content { margin-left: 260px; padding: 40px; transition: 0.3s; }
        .nav-link { padding: 12px 15px; border-radius: 12px; cursor: pointer; font-weight: 700; display: flex; align-items: center; margin-bottom: 8px; opacity: 0.5; transition: 0.2s; }
        .nav-link.active { background: #d4af37; color: #000; opacity: 1; }
        .jtc-card { background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .jtc-input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-weight: 600; margin-bottom: 10px; transition: 0.2s; }
        .jtc-input:focus { border-color: #d4af37; outline: none; background: #fff; }
        .btn-jtc { background: #000; color: #fff; padding: 14px; border-radius: 12px; font-weight: 800; text-transform: uppercase; width: 100%; cursor: pointer; transition: 0.2s; border: none; }
        .btn-jtc:hover { background: #d4af37; color: #000; }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .st-saņemts { background: #f1f5f9; color: #475569; }
        .st-procesā { background: #fef9c3; color: #854d0e; }
        .st-gatavs { background: #dcfce7; color: #166534; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .sidebar { width: 80px; padding: 20px 10px; } .sidebar span, .sidebar h2, .sidebar p { display: none; } .main-content { margin-left: 80px; padding: 15px; } }
    </style>
</head>
<body>

<div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-[9999]">
    <div class="bg-white p-10 rounded-[30px] w-96 text-center shadow-2xl border-t-8 border-[#d4af37]">
        <h1 class="text-3xl font-black mb-1 italic italic">JTC <span class="text-[#d4af37]">LIVE</span></h1>
        <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-8 font-bold">Autorizācija</p>
        <input id="user-name" type="text" placeholder="Lietotājs" class="jtc-input text-center bg-gray-50">
        <input id="pass" type="password" placeholder="Parole" class="jtc-input text-center bg-gray-50 mb-6">
        <button onclick="login()" class="btn-jtc">Ieiet</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="sidebar shadow-2xl">
        <div class="mb-12 px-2">
            <h2 class="text-2xl font-black italic text-[#d4af37]">JTC MOTORS</h2>
            <p class="text-[9px] uppercase tracking-[0.3em] opacity-40">Live Database</p>
        </div>
        <nav>
            <div onclick="showTab('stk')" id="btn-stk" class="nav-link active"><i class="fas fa-boxes w-6"></i> <span>Noliktava</span></div>
            <div onclick="showTab('rep')" id="btn-rep" class="nav-link"><i class="fas fa-clipboard-list w-6"></i> <span>Serviss</span></div>
            <div onclick="showTab('cli')" id="btn-cli" class="nav-link"><i class="fas fa-users w-6"></i> <span>Klienti</span></div>
        </nav>
        <div class="absolute bottom-10 left-8 right-8 text-center">
            <p id="current-user-display" class="text-xs font-bold text-[#d4af37] mb-2"></p>
            <button onclick="logout()" class="text-[10px] uppercase font-black text-red-500 hover:text-white transition">Iziet</button>
        </div>
    </div>

    <div class="main-content">
        <header class="flex justify-between items-center mb-10">
            <h1 id="tab-title" class="text-4xl font-black italic uppercase">Noliktava</h1>
            <div class="relative w-64">
                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                <input type="text" id="global-search" oninput="initLive()" placeholder="Meklēt..." class="jtc-input !mb-0 !pl-12 bg-white shadow-sm border-none">
            </div>
        </header>

        <div id="stk" class="tab-content active">
            <div class="jtc-card grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2"><input id="n" class="jtc-input" placeholder="Prece"></div>
                <input id="p" type="number" class="jtc-input" placeholder="Cena €">
                <input id="q" type="number" class="jtc-input" value="1">
                <input id="sh" class="jtc-input" placeholder="Plaukts">
                <input id="ean" class="jtc-input bg-gray-50" readonly>
                <button onclick="addStk()" class="btn-jtc md:col-span-2">Pievienot</button>
            </div>
            <div class="bg-white rounded-[25px] shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left"><thead class="bg-gray-50 border-b border-gray-100"><tr class="text-[10px] text-gray-400 uppercase font-black"><th class="p-6">Prece</th><th>Plaukts</th><th>Cena/Skaits</th><th>EAN</th><th class="text-right p-6">Dzēst</th></tr></thead><tbody id="list-stk" class="divide-y divide-gray-50"></tbody></table>
            </div>
        </div>

        <div id="rep" class="tab-content">
            <div class="jtc-card grid grid-cols-1 md:grid-cols-4 gap-4">
                <input id="r-nr" class="jtc-input" placeholder="Auto Nr.">
                <input id="r-cl" class="jtc-input" placeholder="Klients">
                <input id="r-jb" class="jtc-input" placeholder="Darbs">
                <button onclick="addRep()" class="btn-jtc">Pievienot</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="list-rep"></div>
        </div>

        <div id="cli" class="tab-content">
            <div class="jtc-card grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="c-nm" class="jtc-input" placeholder="Vārds">
                <input id="c-ph" class="jtc-input" placeholder="Telefons">
                <button onclick="addCli()" class="btn-jtc">Pievienot</button>
            </div>
            <div class="bg-white rounded-[25px] overflow-hidden border border-gray-100 shadow-sm"><table class="w-full text-left"><thead class="bg-gray-50 border-b border-gray-100"><tr class="text-[10px] text-gray-400 uppercase font-black"><th class="p-6">Klients</th><th>Telefons</th><th class="text-right p-6">Dzēst</th></tr></thead><tbody id="list-cli" class="divide-y divide-gray-50"></tbody></table></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK20atH4pmEORbuHLCTAXaSCPUBfz9190",
        authDomain: "jtc-motors.firebaseapp.com",
        databaseURL: "https://jtc-motors-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "jtc-motors",
        storageBucket: "jtc-motors.firebasestorage.app",
        messagingSenderId: "188249204836",
        appId: "1:188249204836:web:d32fe0d71a9dc2c0e71771"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const users = { "Ivars": "JTC-Ivars-2024", "Andris": "JTC-Andris-99", "Juris": "JTC-Juris-88", "Janis": "JTC-Janis-77", "Gints": "JTC-Gints-66" };

    // AUTO-LOGIN CHECK
    window.onload = () => {
        const loggedInUser = localStorage.getItem("jtc_logged_in");
        if(loggedInUser) {
            setupApp(loggedInUser);
        }
    };

    function login() {
        const u = document.getElementById('user-name').value;
        const p = document.getElementById('pass').value;
        if (users[u] && users[u] === p) {
            localStorage.setItem("jtc_logged_in", u);
            setupApp(u);
        } else { alert("Dati nepareizi!"); }
    }

    function logout() {
        localStorage.removeItem("jtc_logged_in");
        location.reload();
    }

    function setupApp(user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('current-user-display').innerText = "Sveiks, " + user;
        genEAN();
        initLive();
        checkAndSeed(); // Pievieno 20 preces, ja tukšs
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById('btn-'+t).classList.add('active');
        const titles = {'stk': 'Noliktava', 'rep': 'Servisa Rinda', 'cli': 'Klientu Bāze'};
        document.getElementById('tab-title').innerText = titles[t];
    }

    function genEAN() { document.getElementById('ean').value = "JTC" + Math.floor(100000 + Math.random() * 899999); }

    function addStk() {
        const n=document.getElementById('n').value, p=document.getElementById('p').value, q=document.getElementById('q').value, sh=document.getElementById('sh').value, ean=document.getElementById('ean').value;
        if(n && p) { database.ref('stock').push().set({n, p, q, sh, ean}); document.getElementById('n').value=''; genEAN(); }
    }

    function addRep() {
        const nr=document.getElementById('r-nr').value.toUpperCase(), cl=document.getElementById('r-cl').value, jb=document.getElementById('r-jb').value;
        if(nr) { database.ref('repairs').push().set({nr, cl, jb, st: 'Saņemts', date: new Date().toLocaleDateString('lv-LV')}); document.getElementById('r-nr').value=''; }
    }

    function addCli() {
        const nm=document.getElementById('c-nm').value, ph=document.getElementById('c-ph').value;
        if(nm) { database.ref('clients').push().set({nm, ph}); document.getElementById('c-nm').value=''; }
    }

    function cycleStatus(id, current) {
        const states = ['Saņemts', 'Procesā', 'Gatavs'];
        let next = states[(states.indexOf(current) + 1) % states.length];
        database.ref('repairs/'+id).update({st: next});
    }

    function remove(path) { if(confirm("Dzēst?")) database.ref(path).remove(); }

    function initLive() {
        const search = document.getElementById('global-search').value.toLowerCase();
        database.ref('stock').on('value', s => {
            let h = ''; const data = s.val();
            if(data) Object.keys(data).forEach(id => { 
                const i = data[id]; 
                if(i.n.toLowerCase().includes(search) || i.ean.toLowerCase().includes(search)) {
                    h += `<tr class="hover:bg-gray-50"><td class="p-6 font-bold">${i.n}</td><td><span class="bg-black text-white px-2 py-1 rounded text-[10px] font-bold">${i.sh||'-'}</span></td><td class="font-bold">${i.p}€ (${i.q}gb)</td><td><svg id="b-${id}" class="h-8"></svg></td><td class="text-right p-6"><button onclick="remove('stock/${id}')" class="text-red-300"><i class="fas fa-trash"></i></button></td></tr>`;
                }
            });
            document.getElementById('list-stk').innerHTML = h;
            if(data) Object.keys(data).forEach(id => { if(document.getElementById(`b-${id}`)) JsBarcode(`#b-${id}`, data[id].ean, {displayValue:false, height:20, width:1}); });
        });

        database.ref('repairs').on('value', s => {
            let h = ''; const data = s.val();
            if(data) Object.keys(data).forEach(id => { 
                const r = data[id]; 
                if(r.nr.toLowerCase().includes(search) || r.cl.toLowerCase().includes(search)) {
                    h += `<div class="jtc-card !mb-0 border-t-4 ${r.st === 'Gatavs' ? 'border-green-500' : (r.st === 'Procesā' ? 'border-yellow-400' : 'border-gray-200')}"><div class="flex justify-between items-start mb-4"><h3 class="text-2xl font-black italic tracking-tighter">${r.nr}</h3><span onclick="cycleStatus('${id}', '${r.st}')" class="status-badge st-${r.st.toLowerCase().replace(/ā/g, 'a')}">${r.st}</span></div><p class="text-[10px] font-bold text-gray-400 uppercase mb-1 font-bold italic">Klients: ${r.cl}</p><div class="bg-gray-50 p-3 rounded-xl text-xs font-semibold border border-gray-100">${r.jb}</div><div class="mt-4 flex justify-between items-center"><span class="text-[9px] text-gray-300 font-bold italic uppercase">${r.date}</span><button onclick="remove('repairs/${id}')" class="text-[9px] font-black text-red-400 uppercase">Gatavs/Izdots</button></div></div>`;
                }
            });
            document.getElementById('list-rep').innerHTML = h;
        });

        database.ref('clients').on('value', s => {
            let h = ''; const data = s.val();
            if(data) Object.keys(data).forEach(id => { 
                const c = data[id];
                if(c.nm.toLowerCase().includes(search)) {
                    h += `<tr class="hover:bg-gray-50"><td class="p-6 font-bold uppercase italic">${c.nm}</td><td class="font-bold text-blue-600">${c.ph}</td><td class="text-right p-6"><a href="tel:${c.ph}" class="mr-4 text-green-500"><i class="fas fa-phone"></i></a><button onclick="remove('clients/${id}')" class="text-red-200"><i class="fas fa-times"></i></button></td></tr>`;
                }
            });
            document.getElementById('list-cli').innerHTML = h;
        });
    }

    function checkAndSeed() {
        database.ref('stock').once('value', s => {
            if(!s.exists()) {
                const preces = [
                    {n:"Eļļa Castrol 5W-30 5L", p:45, q:10, sh:"A-1"}, {n:"Filtrs MANN HU711/51", p:12, q:20, sh:"A-2"},
                    {n:"Bremžu kluči Brembo (Priekša)", p:55, q:4, sh:"B-1"}, {n:"Bremžu diski TRW (Pāris)", p:85, q:2, sh:"B-5"},
                    {n:"Zobsiksnas komplekts Gates", p:120, q:3, sh:"C-1"}, {n:"Ūdenssūknis SKF", p:40, q:5, sh:"C-2"},
                    {n:"Aizdedzes svece NGK Laser", p:15, q:24, sh:"D-1"}, {n:"Akumulators VARTA 74Ah", p:95, q:6, sh:"E-1"},
                    {n:"Logu slotiņas Bosch AeroTwin", p:28, q:12, sh:"F-1"}, {n:"Antifrīzs G12 Sārts 5L", p:14, q:15, sh:"G-1"},
                    {n:"Ritošās daļas svira (Lemforder)", p:65, q:2, sh:"B-8"}, {n:"Amortizators Sachs (Aizmugure)", p:48, q:4, sh:"B-10"},
                    {n:"Gaisa filtrs Filtron", p:10, q:15, sh:"A-5"}, {n:"Degvielas filtrs Bosch", p:25, q:8, sh:"A-6"},
                    {n:"Salona filtrs (Ogles)", p:18, q:10, sh:"A-7"}, {n:"Spuldze H7 Osram NightBreaker", p:22, q:20, sh:"D-5"},
                    {n:"Bremžu šķidrums DOT4 1L", p:9, q:12, sh:"G-3"}, {n:"Vārstu vāka blīve (Elring)", p:15, q:5, sh:"C-5"},
                    {n:"Gultnis FAG (Priekšējais)", p:50, q:4, sh:"B-12"}, {n:"Lambda zonde Bosch", p:75, q:2, sh:"D-10"}
                ];
                preces.forEach(p => database.ref('stock').push().set({...p, ean: "JTC"+Math.floor(100000+Math.random()*899999)}));
            }
        });
    }
</script>
</body>
</html>
