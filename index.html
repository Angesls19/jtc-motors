<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTC MOTORS | LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        .sidebar { width: 260px; background: #000; height: 100vh; position: fixed; padding: 30px 20px; color: #fff; z-index: 50; }
        .main-content { margin-left: 260px; padding: 40px; }
        .admin-card { background: #ffffff; border-radius: 16px; padding: 25px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .jtc-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-weight: 600; margin-bottom: 12px; }
        .btn-jtc { background: #000; color: #fff; padding: 14px; border-radius: 10px; font-weight: 800; text-transform: uppercase; width: 100%; cursor: pointer; }
        .jtc-table td { background: #fff; padding: 15px 20px; border-bottom: 1px solid #f1f5f9; font-weight: 700; color: #000; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span, .sidebar h2 { display: none; } .main-content { margin-left: 70px; padding: 20px; } }
    </style>
</head>
<body>

<div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-[9999]">
    <div class="bg-white p-10 rounded-3xl w-80 text-center border-t-8 border-[#d4af37]">
        <h1 class="text-3xl font-black mb-8 italic">JTC <span class="text-[#d4af37]">LIVE</span></h1>
        <input id="user-name" type="text" placeholder="Lietotājs" class="jtc-input text-center">
        <input id="pass" type="password" placeholder="Parole" class="jtc-input text-center mb-6">
        <button onclick="login()" class="btn-jtc">Ieeit</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="sidebar">
        <h2 class="text-2xl font-black italic mb-12 text-[#d4af37]">JTC</h2>
        <nav class="space-y-4">
            <div class="p-4 bg-white text-black rounded-xl font-bold"><i class="fas fa-sync-alt mr-3 text-blue-500"></i> <span>Kopējā Noliktava</span></div>
        </nav>
        <div class="absolute bottom-10 left-8 text-xs font-bold text-gray-400 uppercase tracking-widest">
            Lietotājs: <br><span id="current-user" class="text-white text-base italic"></span>
        </div>
    </div>

    <div class="main-content">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black italic">Noliktava <span class="text-gray-400">Cloud</span></h1>
            <button onclick="location.reload()" class="text-xs font-bold text-red-500 uppercase">Iziet</button>
        </header>

        <div class="admin-card grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-2">
                <input id="n" class="jtc-input" placeholder="Preces nosaukums">
                <div class="grid grid-cols-3 gap-2">
                    <input id="p" class="jtc-input" placeholder="Cena €">
                    <input id="q" class="jtc-input" value="1" placeholder="Skaits">
                    <input id="sh" class="jtc-input" placeholder="Plaukts">
                </div>
                <input id="ean" class="jtc-input bg-gray-50 mb-4" readonly>
                <button onclick="addToFirebase()" class="btn-jtc">Pievienot visiem</button>
            </div>
            <div class="bg-blue-50 rounded-2xl flex flex-col items-center justify-center p-6 border-2 border-dashed border-blue-200">
                <i class="fas fa-cloud-upload-alt text-blue-400 text-3xl mb-2"></i>
                <p class="text-blue-800 font-bold text-[10px] uppercase text-center tracking-tighter">Sinhronizācija aktīva: Visi lietotāji redz datus uzreiz.</p>
            </div>
        </div>

        <table class="w-full">
            <thead>
                <tr class="text-[10px] text-gray-400 uppercase font-black">
                    <th class="text-left px-5 pb-2">Prece</th><th class="text-left px-5 pb-2">Plaukts</th><th class="text-left px-5 pb-2">Detaļas</th><th class="text-left px-5 pb-2">EAN</th><th class="text-right px-5 pb-2">Darbība</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<script>
    // --- TAVA KONFIGURĀCIJA ---
    const firebaseConfig = {
        apiKey: "AIzaSyBK20atH4pmEORbuHLCTAXaSCPUBfz9190",
        authDomain: "jtc-motors.firebaseapp.com",
        databaseURL: "https://jtc-motors-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "jtc-motors",
        storageBucket: "jtc-motors.firebasestorage.app",
        messagingSenderId: "188249204836",
        appId: "1:188249204836:web:d32fe0d71a9dc2c0e71771"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const users = {
        "Andris": "jtc1", 
        "Juris": "jtc2", 
        "Janis": "jtc3", 
        "Gints": "jtc4", 
        "Ivars": "admin123"
    };

    function login() {
        const u = document.getElementById('user-name').value;
        const p = document.getElementById('pass').value;
        if (users[u] && users[u] === p) {
            document.getElementById('login-screen').remove();
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('current-user').innerText = u;
            genEAN();
            loadFromFirebase();
        } else {
            alert("Nepareizs lietotājs vai parole!");
        }
    }

    function genEAN() { document.getElementById('ean').value = "JTC" + Math.floor(100000 + Math.random() * 899999); }

    function addToFirebase() {
        const n=document.getElementById('n').value, p=document.getElementById('p').value, q=document.getElementById('q').value, sh=document.getElementById('sh').value, ean=document.getElementById('ean').value;
        if(n && p) {
            db.ref('stock').push().set({ n, p, q, sh, ean });
            document.getElementById('n').value=''; document.getElementById('p').value=''; genEAN();
        } else {
            alert("Aizpildi nosaukumu un cenu!");
        }
    }

    function loadFromFirebase() {
        db.ref('stock').on('value', (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('list');
            list.innerHTML = '';
            if (data) {
                Object.keys(data).forEach((id) => {
                    const i = data[id];
                    list.insertAdjacentHTML('afterbegin', `
                        <tr>
                            <td class="px-5 text-lg">${i.n}</td>
                            <td class="px-5"><span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-md text-sm">${i.sh || '-'}</span></td>
                            <td class="px-5 text-gray-600">${i.p} € <span class="text-xs text-gray-400">(${i.q} gab)</span></td>
                            <td class="px-5"><svg id="b-${id}" class="h-8 w-32"></svg></td>
                            <td class="text-right px-5">
                                <button onclick="deleteItem('${id}')" class="text-red-200 hover:text-red-600 transition-colors"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`);
                    JsBarcode(`#b-${id}`, i.ean, { format: "CODE128", displayValue: false, height: 25, width: 1.2 });
                });
            }
        });
    }

    function deleteItem(id) { if(confirm("Dzēst šo preci visiem?")) db.ref('stock/' + id).remove(); }
</script>
</body>
</html>
